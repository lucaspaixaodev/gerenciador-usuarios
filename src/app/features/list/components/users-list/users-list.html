  @for (user of users(); track user) {
    <mat-card>
      <mat-card-content class="card-content">
        <span>
          {{ user.name }}
        </span>
        <button class="action-button" matButton="filled" (click) = "remove(user)">Remove</button>
      </mat-card-content>
    </mat-card>
  }
